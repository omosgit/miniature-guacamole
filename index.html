<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steamer Comparison Scales</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111210;
    --surface: #1A1B19;
    --surface2: #222320;
    --border: #2E2F2C;
    --text: #EDECEA;
    --muted: #6B6C68;
    --gold: #E8B84B;
    --gold-dim: #7A5F1A;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 32px 60px;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 48px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: rgba(232, 184, 75, 0.04);
  }

  .upload-left { display: flex; align-items: center; gap: 14px; }

  .upload-icon {
    width: 36px; height: 36px;
    background: var(--surface2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .upload-text { font-size: 12px; color: var(--muted); letter-spacing: 0.04em; }
  .upload-text strong { color: var(--text); display: block; margin-bottom: 2px; font-size: 13px; }

  .upload-btn {
    background: var(--gold);
    color: #111;
    border: none;
    border-radius: 7px;
    padding: 8px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .upload-btn:hover { opacity: 0.85; }

  #file-input { display: none; }

  /* Header */
  .page-header {
    text-align: center;
    margin-bottom: 52px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  h1 em {
    font-style: normal;
    color: var(--gold);
  }

  .steamer-count {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
  }

  /* Scale sections */
  .scales-wrap {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 56px;
  }

  .scale-section { animation: fadeUp 0.5s ease both; }
  .scale-section:nth-child(1) { animation-delay: 0.05s; }
  .scale-section:nth-child(2) { animation-delay: 0.15s; }
  .scale-section:nth-child(3) { animation-delay: 0.25s; }

  .scale-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  .scale-unit {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* The scale itself */
  .scale-container {
    position: relative;
    padding-bottom: 0;
    margin: 0 24px;
  }

  .scale-track {
    position: relative;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
  }

  /* Arrow at end */
  .scale-track::after {
    content: '';
    position: absolute;
    right: -8px;
    top: 50%;
    transform: translateY(-50%);
    border-left: 8px solid var(--border);
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }

  /* Tick marks - hang below the track */
  .tick-mark {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tick-line {
    width: 1px;
    height: 8px;
    background: var(--border);
  }

  .tick-val {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-top: 4px;
    white-space: nowrap;
  }

  /* Labels area below track */
  .labels-area {
    position: relative;
    margin-top: 36px; /* room for ticks + tick values */
  }

  /* Steamer markers - positioned in labels-area */
  .steamer-marker {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: default;
  }

  .marker-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--bg);
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(232,184,75,0.4);
    position: absolute;
    top: -47px; /* sits on the track line */
    left: 50%;
    transform: translateX(-50%);
  }

  .marker-line {
    width: 1.5px;
    background: var(--gold);
    opacity: 0.4;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .marker-label {
    font-size: 10px;
    color: var(--text);
    letter-spacing: 0.03em;
    text-align: center;
    line-height: 1.35;
    max-width: 72px;
    word-break: break-word;
    hyphens: auto;
    position: relative;
  }

  .marker-value {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    margin-top: 3px;
    white-space: nowrap;
    position: relative;
  }

  .export-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .export-btn:hover { border-color: var(--gold); color: var(--gold); }
  .export-btn svg { flex-shrink: 0; }

  /* Toggle switch */
  .scale-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 28px;
  }

  .scale-header-left { display: flex; align-items: baseline; gap: 12px; }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .toggle-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
    white-space: nowrap;
  }

  .toggle-label.active { color: var(--text); }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute;
    inset: 0;
    border-radius: 99px;
    background: var(--gold);
    cursor: pointer;
    transition: background 0.25s;
  }

  .toggle-track::before {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    left: 3px;
    top: 3px;
    border-radius: 50%;
    background: var(--bg);
    transition: transform 0.25s;
  }

  .toggle input:checked + .toggle-track {
    background: #4A9EE8;
  }

  .toggle input:checked + .toggle-track::before {
    transform: translateX(16px);
  }

  /* Blue mode for advertised */
  .scale-section.advertised .marker-dot { background: #4A9EE8; box-shadow: 0 0 8px rgba(74,158,232,0.4); }
  .scale-section.advertised .marker-line { background: #4A9EE8; }
  .scale-section.advertised .marker-value { color: #4A9EE8; }

  /* Steamer filter list */
  .steamer-filter {
    max-width: 960px;
    margin: 0 auto 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
  }

  .filter-heading {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .filter-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .filter-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.03em;
    user-select: none;
  }

  .filter-pill.active {
    border-color: var(--gold);
    background: rgba(232,184,75,0.08);
    color: var(--text);
  }

  .filter-pill-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .filter-pill.active .filter-pill-dot {
    background: var(--gold);
  }

  /* Target input panel */
  .target-panel {
    max-width: 960px;
    margin: 0 auto 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
  }

  .target-heading {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .target-fields {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    align-items: end;
  }

  .target-field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .target-field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .target-field input:focus { border-color: #E05C5C; }

  .target-field input::placeholder { color: var(--muted); }

  .target-calc {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--muted);
    min-height: 38px;
    display: flex;
    align-items: center;
  }

  .target-calc.has-value { color: #E05C5C; font-weight: 500; }

  .target-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .target-clear:hover { border-color: #E05C5C; color: #E05C5C; }

  /* Target marker on scale */
  .target-marker .marker-dot {
    background: #E05C5C !important;
    box-shadow: 0 0 8px rgba(224,92,92,0.5) !important;
    width: 12px !important;
    height: 12px !important;
  }

  .target-marker .marker-line { background: #E05C5C !important; opacity: 0.5 !important; }
  .target-marker .marker-label { color: #E05C5C !important; font-weight: 500; }
  .target-marker .marker-value { color: #E05C5C !important; }

  /* Divider */
  .scale-divider {
    height: 1px;
    background: var(--border);
    max-width: 960px;
    margin: 0 auto;
  }

  /* Empty / loading state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.06em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  footer {
    text-align: center;
    margin-top: 56px;
    font-size: 10px;
    color: var(--border);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div style="max-width:960px;margin:0 auto 0;">
  <!-- Upload -->
  <div class="upload-zone" id="upload-zone">
    <div class="upload-left">
      <div class="upload-icon">📊</div>
      <div class="upload-text">
        <strong id="upload-title">Upload your steamer data</strong>
        <span id="upload-sub">Drop your Excel file here to update the scales</span>
      </div>
    </div>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">Choose File</button>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls">

  <!-- Header -->
  <div class="page-header">
    <p class="eyebrow">Performance Analysis</p>
    <h1>Steamer <em>Scales</em></h1>
    <p class="steamer-count" id="steamer-count">Showing 4 steamers</p>
  </div>
  <!-- Steamer filter -->
  <div class="steamer-filter" id="steamer-filter">
    <div class="filter-heading">Steamers</div>
    <div class="filter-pills" id="filter-pills"><!-- rendered by JS --></div>
  </div>

  <!-- Target inputs -->
  <div class="target-panel">
    <div class="target-heading">Target Steamer</div>
    <div class="target-fields">
      <div class="target-field">
        <label>Steam Rate (g/min)</label>
        <input type="number" id="target-sr" placeholder="e.g. 18" min="0" step="0.1" oninput="updateTarget()">
      </div>
      <div class="target-field">
        <label>Tank Capacity (g)</label>
        <input type="number" id="target-tc" placeholder="e.g. 150" min="0" step="1" oninput="updateTarget()">
      </div>
      <div class="target-field">
        <label>Calculated Run Time</label>
        <div class="target-calc" id="target-rt-display">— enter values above</div>
      </div>
      <div class="target-field" style="display:flex;align-items:flex-end;">
        <button class="target-clear" onclick="clearTarget()">Clear</button>
      </div>
    </div>
  </div>
</div>

<!-- Scales -->
<div class="scales-wrap" id="scales-wrap">
  <!-- Rendered by JS -->
</div>

<footer id="footer">Data loaded from Excel · May 2026</footer>

<script>
// ── Default data (measured + advertised) ─────────────────────────────────
const DEFAULT_DATA = [
  { name: 'Steamery Cirrus Lite',
    steamRateMeasured: 11.4,  steamRateAdvertised: 16.0,
    tankCapacityMeasured: 62.2,  tankCapacityAdvertised: 70.0,
    runTimeMeasured: 14.1,  runTimeAdvertised: null },
  { name: 'Breville',
    steamRateMeasured: 23.5,  steamRateAdvertised: 20.0,
    tankCapacityMeasured: 196.2, tankCapacityAdvertised: 200.0,
    runTimeMeasured: 21.7,  runTimeAdvertised: null },
  { name: 'Tefal',
    steamRateMeasured: 22.83, steamRateAdvertised: 20.0,
    tankCapacityMeasured: 66.0,  tankCapacityAdvertised: 70.0,
    runTimeMeasured: 8.5,   runTimeAdvertised: null },
  { name: 'Banxye',
    steamRateMeasured: 20.92, steamRateAdvertised: 22.0,
    tankCapacityMeasured: 112.2, tankCapacityAdvertised: 120.0,
    runTimeMeasured: 14.2,  runTimeAdvertised: null },
];

// ── Excel row indices (1-based, as in your spreadsheet) ───────────────────
const ROW_IDX = {
  tankCapacityAdvertised: 16,
  tankCapacityMeasured:   17,
  steamRateAdvertised:    19,
  steamRateMeasured:      20,
  runTimeAdvertised:      22,
  runTimeMeasured:        23,
};

// ── Metric config ─────────────────────────────────────────────────────────
const METRICS = [
  { id: 'tankCapacity', label: 'Tank Capacity', unit: 'grams',   decimals: 0,
    measured: 'tankCapacityMeasured', advertised: 'tankCapacityAdvertised' },
  { id: 'steamRate',    label: 'Steam Rate',    unit: 'g/min',   decimals: 1,
    measured: 'steamRateMeasured',    advertised: 'steamRateAdvertised'    },
  { id: 'runTime',      label: 'Run Time',      unit: 'minutes', decimals: 1,
    measured: 'runTimeMeasured',      advertised: 'runTimeAdvertised'      },
];

// ── Toggle state: 'measured' or 'advertised' per metric ───────────────────
const toggleState = { tankCapacity: 'measured', steamRate: 'measured', runTime: 'measured' };

// ── Target state ──────────────────────────────────────────────────────────
const target = { steamRate: null, tankCapacity: null, runTime: null };

// ── Helpers ───────────────────────────────────────────────────────────────
function timeToMinutes(val) {
  if (val instanceof Date) return val.getHours() * 60 + val.getMinutes() + val.getSeconds() / 60;
  if (typeof val === 'number') return val < 1 ? val * 24 * 60 : val;
  if (typeof val === 'string' && val.includes(':')) {
    const parts = val.split(':').map(Number);
    return parts[0] * 60 + (parts[1] || 0) + (parts[2] || 0) / 60;
  }
  return parseFloat(val) || null;
}

function parseExcel(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

  // Find header row (first row where col 0 is empty and col 1+ are strings)
  let headerRowIdx = -1;
  let steamerNames = [];
  for (let i = 0; i < rows.length; i++) {
    if (rows[i][0] === null && rows[i][1] && typeof rows[i][1] === 'string') {
      headerRowIdx = i;
      steamerNames = rows[i].slice(1).filter(v => v);
      break;
    }
  }
  if (headerRowIdx === -1 || steamerNames.length === 0) return null;

  const numCols = steamerNames.length;

  function getRow(oneBasedIdx) {
    return rows[oneBasedIdx - 1] || [];
  }

  function parseRow(oneBasedIdx, isTime) {
    const r = getRow(oneBasedIdx);
    return r.slice(1, numCols + 1).map(v => {
      if (v === null || v === '') return null;
      return isTime ? timeToMinutes(v) : parseFloat(v) || null;
    });
  }

  const tc_adv = parseRow(ROW_IDX.tankCapacityAdvertised);
  const tc_mea = parseRow(ROW_IDX.tankCapacityMeasured);
  const sr_adv = parseRow(ROW_IDX.steamRateAdvertised);
  const sr_mea = parseRow(ROW_IDX.steamRateMeasured);
  const rt_adv = parseRow(ROW_IDX.runTimeAdvertised, true);
  const rt_mea = parseRow(ROW_IDX.runTimeMeasured,   true);

  return steamerNames.map((name, i) => ({
    name,
    tankCapacityAdvertised: tc_adv[i], tankCapacityMeasured: tc_mea[i],
    steamRateAdvertised:    sr_adv[i], steamRateMeasured:    sr_mea[i],
    runTimeAdvertised:      rt_adv[i], runTimeMeasured:      rt_mea[i],
  }));
}

// ── Scale rendering ───────────────────────────────────────────────────────
function niceRange(min, max) {
  const range = max - min || 1;
  const lo = Math.max(0, Math.floor(min - range * 0.15));
  const hi = Math.ceil(max + range * 0.15);
  return [lo, hi];
}

function niceTickStep(range) {
  const rough = range / 6;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const steps = [1,2,5,10].map(s => s * mag);
  return steps.find(s => range / s <= 8) || steps[steps.length - 1];
}

// Fixed ranges computed once from ALL data (both measured + advertised)
// Stored globally so they NEVER change when toggling or filtering
let FIXED_RANGES = {};

function computeFixedRanges() {
  const targetMap = { tankCapacity: target.tankCapacity, steamRate: target.steamRate, runTime: target.runTime };
  METRICS.forEach(m => {
    const vals = currentData.flatMap(s => [s[m.measured], s[m.advertised]])
      .concat([targetMap[m.id]])
      .filter(v => v != null && !isNaN(v));
    if (vals.length === 0) { FIXED_RANGES[m.id] = [0, 1]; return; }
    FIXED_RANGES[m.id] = niceRange(Math.min(...vals), Math.max(...vals));
  });
}

function getFixedRange(metric) {
  return FIXED_RANGES[metric.id] || [0, 1];
}
function buildScaleHTML(metric, visibleSteamers, mode, fixedMin, fixedMax) {
  const dataKey = mode === 'advertised' ? metric.advertised : metric.measured;
  const vals = visibleSteamers.map(s => s[dataKey]).filter(v => v != null && !isNaN(v));

  const range = fixedMax - fixedMin || 1;
  const step = niceTickStep(fixedMax - fixedMin);

  function pct(v) { return ((v - fixedMin) / range * 96).toFixed(2); }

  let ticks = '';
  const firstTick = Math.ceil(fixedMin / step) * step;
  for (let t = firstTick; t <= fixedMax; t = Math.round((t + step) * 1000) / 1000) {
    ticks += `<div class="tick-mark" style="left:${pct(t)}%">
      <div class="tick-line"></div>
      <div class="tick-val">${Number.isInteger(step) ? Math.round(t) : t.toFixed(1)}</div>
    </div>`;
  }

  // Build list of all markers: steamers + optional target
  const targetMap = { tankCapacity: target.tankCapacity, steamRate: target.steamRate, runTime: target.runTime };
  const targetVal = targetMap[metric.id];

  const steamerItems = visibleSteamers
    .filter(s => s[dataKey] != null && !isNaN(s[dataKey]))
    .map(s => ({ name: s.name, val: s[dataKey], isTarget: false }));

  const targetItem = (targetVal != null && !isNaN(targetVal))
    ? [{ name: 'Target', val: targetVal, isTarget: true }] : [];

  const sorted = [...steamerItems, ...targetItem].sort((a, b) => a.val - b.val);

  if (sorted.length === 0) return '<div class="empty-state">No data available</div>';

  const ROW_H = 72, PCT_THRESH = 7;
  const rowNums = new Array(sorted.length).fill(0);
  for (let i = 1; i < sorted.length; i++) {
    if (parseFloat(pct(sorted[i].val)) - parseFloat(pct(sorted[i-1].val)) < PCT_THRESH) {
      rowNums[i] = rowNums[i-1] + 1;
    }
  }
  const labelsAreaH = (Math.max(...rowNums) + 1) * ROW_H + 16;

  let markers = '';
  sorted.forEach((item, i) => {
    const p = pct(item.val);
    const rowTop = rowNums[i] * ROW_H;
    const lineH = rowTop + 8;
    const displayVal = metric.decimals === 0 ? Math.round(item.val) : item.val.toFixed(metric.decimals);
    const cls = item.isTarget ? ' target-marker' : '';
    markers += `
      <div class="steamer-marker${cls}" style="left:${p}%;">
        <div class="marker-dot"></div>
        <div class="marker-line" style="top:-3px;height:${lineH}px;"></div>
        <div style="position:absolute;top:${rowTop+8}px;display:flex;flex-direction:column;align-items:center;width:80px;left:50%;transform:translateX(-50%);">
          <div class="marker-label">${item.name}</div>
          <div class="marker-value">${displayVal}</div>
        </div>
      </div>`;
  });

  return `
    <div class="scale-track">${ticks}</div>
    <div class="labels-area" style="height:${labelsAreaH}px;position:relative;">${markers}</div>`;
}

// ── Filter state ──────────────────────────────────────────────────────────
let activeFilters = new Set(); // steamer names that are ON

function getVisibleSteamers() {
  return currentData.filter(s => activeFilters.has(s.name));
}

function renderFilterPills() {
  const container = document.getElementById('filter-pills');
  container.innerHTML = currentData.map(s => {
    const on = activeFilters.has(s.name);
    return `<div class="filter-pill${on ? ' active' : ''}" onclick="toggleFilter('${s.name.replace(/'/g,"\\'")}')">
      <div class="filter-pill-dot"></div>
      ${s.name}
    </div>`;
  }).join('');
}

function toggleFilter(name) {
  if (activeFilters.has(name)) {
    if (activeFilters.size === 1) return; // keep at least one
    activeFilters.delete(name);
  } else {
    activeFilters.add(name);
  }
  renderFilterPills();
  renderAllScales(getVisibleSteamers());
}

function renderAllScales(visibleSteamers) {
  const wrap = document.getElementById('scales-wrap');
  const total = visibleSteamers.length;
  document.getElementById('steamer-count').textContent =
    `Showing ${total} of ${currentData.length} steamer${currentData.length !== 1 ? 's' : ''}`;

  let html = '';
  METRICS.forEach((m, i) => {
    const mode = toggleState[m.id];
    const isAdv = mode === 'advertised';
    const [fixedMin, fixedMax] = getFixedRange(m);
    html += `
      <div class="scale-section${isAdv ? ' advertised' : ''}" id="section-${m.id}">
        <div class="scale-header">
          <div class="scale-header-left">
            <span class="scale-title">${m.label}</span>
            <span class="scale-unit">${m.unit}</span>
          </div>
          <div class="toggle-wrap">
            <span class="toggle-label${!isAdv ? ' active' : ''}">Measured</span>
            <label class="toggle">
              <input type="checkbox" ${isAdv ? 'checked' : ''} onchange="onToggle('${m.id}')">
              <div class="toggle-track"></div>
            </label>
            <span class="toggle-label${isAdv ? ' active' : ''}">Advertised</span>
          </div>
          <button class="export-btn" onclick="exportPDF('${m.id}', '${m.label}')">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            PDF
          </button>
        </div>
        <div class="scale-container" id="container-${m.id}" data-min="${fixedMin}" data-max="${fixedMax}">
          ${buildScaleHTML(m, visibleSteamers, mode, fixedMin, fixedMax)}
        </div>
      </div>`;
    if (i < METRICS.length - 1) html += '<div class="scale-divider"></div>';
  });

  wrap.innerHTML = html;
}

// ── Toggle handler ────────────────────────────────────────────────────────
function onToggle(metricId) {
  toggleState[metricId] = toggleState[metricId] === 'measured' ? 'advertised' : 'measured';
  const metric = METRICS.find(m => m.id === metricId);
  const mode = toggleState[metricId];
  const isAdv = mode === 'advertised';

  const section = document.getElementById(`section-${metricId}`);
  section.classList.toggle('advertised', isAdv);

  const labels = section.querySelectorAll('.toggle-label');
  labels[0].classList.toggle('active', !isAdv);
  labels[1].classList.toggle('active', isAdv);

  const container = document.getElementById(`container-${metricId}`);
  const [fixedMin, fixedMax] = getFixedRange(metric);
  container.innerHTML = buildScaleHTML(metric, getVisibleSteamers(), mode, fixedMin, fixedMax);
}

// ── Target input ──────────────────────────────────────────────────────────
function updateTarget() {
  const sr = parseFloat(document.getElementById('target-sr').value);
  const tc = parseFloat(document.getElementById('target-tc').value);
  const rtDisplay = document.getElementById('target-rt-display');

  target.steamRate    = isNaN(sr) ? null : sr;
  target.tankCapacity = isNaN(tc) ? null : tc;

  // Run time = tank capacity / steam rate (minutes)
  if (target.steamRate > 0 && target.tankCapacity > 0) {
    target.runTime = target.tankCapacity / target.steamRate;
    rtDisplay.textContent = target.runTime.toFixed(1) + ' min';
    rtDisplay.classList.add('has-value');
  } else {
    target.runTime = null;
    rtDisplay.textContent = '— enter values above';
    rtDisplay.classList.remove('has-value');
  }

  // Re-render scales only if data is loaded
  if (currentData.length > 0) {
    computeFixedRanges();
    renderAllScales(getVisibleSteamers());
  }
}

function clearTarget() {
  document.getElementById('target-sr').value = '';
  document.getElementById('target-tc').value = '';
  target.steamRate = null;
  target.tankCapacity = null;
  target.runTime = null;
  document.getElementById('target-rt-display').textContent = '— enter values above';
  document.getElementById('target-rt-display').classList.remove('has-value');
  if (currentData.length > 0) {
    computeFixedRanges();
    renderAllScales(getVisibleSteamers());
  }
}

// ── PDF Export ────────────────────────────────────────────────────────────
async function exportPDF(metricId, metricLabel) {
  const section = document.getElementById(`section-${metricId}`);
  const btn = section.querySelector('.export-btn');
  const origText = btn.innerHTML;
  btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Exporting...';
  btn.disabled = true;

  try {
    const canvas = await html2canvas(section, {
      backgroundColor: '#111210',
      scale: 2,
      useCORS: true,
      logging: false,
    });

    const { jsPDF } = window.jspdf;
    const imgW = 297; // A4 landscape width in mm
    const imgH = (canvas.height / canvas.width) * imgW;
    const pdf = new jsPDF({ orientation: imgH > imgW ? 'portrait' : 'landscape', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const scale = Math.min(pageW / imgW, pageH / imgH);
    const x = (pageW - imgW * scale) / 2;
    const y = (pageH - imgH * scale) / 2;

    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', x, y, imgW * scale, imgH * scale);
    const mode = toggleState[metricId] === 'advertised' ? 'Advertised' : 'Measured';
    pdf.save(`${metricLabel.replace(/ /g, '_')}_${mode}.pdf`);
  } catch(err) {
    console.error(err);
    alert('Export failed: ' + err.message);
  } finally {
    btn.innerHTML = origText;
    btn.disabled = false;
  }
}

// ── File handling ─────────────────────────────────────────────────────────
let currentData = DEFAULT_DATA;

function initData(data) {
  currentData = data;
  computeFixedRanges(); // compute once, never changes after this
  activeFilters = new Set(data.map(s => s.name));
  renderFilterPills();
  renderAllScales(getVisibleSteamers());
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = parseExcel(e.target.result);
      if (!data || data.length === 0) {
        alert('Could not read steamer data. Please check your spreadsheet format.');
        return;
      }
      document.getElementById('upload-title').textContent = file.name;
      document.getElementById('upload-sub').textContent = `${data.length} steamers loaded · drop a new file to refresh`;
      document.getElementById('footer').textContent = `Data from ${file.name} · ${new Date().toLocaleDateString('en-GB', {month:'long', year:'numeric'})}`;
      initData(data);
    } catch(err) {
      console.error(err);
      alert('Error reading file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));

const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
zone.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') document.getElementById('file-input').click();
});

// Show blank state on start — waiting for Excel upload
document.getElementById('steamer-count').textContent = 'Upload a spreadsheet to get started';
document.getElementById('scales-wrap').innerHTML = `
  <div style="text-align:center;padding:80px 20px;color:var(--muted);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;">
    No data loaded · upload your Excel file above
  </div>`;
</script>
